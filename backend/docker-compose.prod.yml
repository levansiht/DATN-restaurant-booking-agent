# Production-style compose: built image (no source bind-mount), restart policies,
# DB healthcheck. Use this on a VPS / Docker host. Provide a real .env file.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
services:
  db:
    image: ankane/pgvector
    container_name: ai_chat_bot_db
    restart: unless-stopped
    volumes:
      - ./postgres_init.sql:/docker-entrypoint-initdb.d/postgres_init.sql
      - postgres_db_api_chat_bot:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGUSER=${POSTGRES_USER}
      - PGPASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api_chat_bot_network

  backend:
    container_name: ai_chat_bot_backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - api_chat_bot_network

  # Optional: admin notifications (Telegram). Remove if you don't use it.
  n8n:
    image: n8nio/n8n:latest
    container_name: ai_chat_bot_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_PUBLIC_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - N8N_ADMIN_WEBHOOK_SECRET=${N8N_ADMIN_WEBHOOK_SECRET:-change-this-n8n-secret}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - FACEBOOK_PAGE_ACCESS_TOKEN=${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      - FACEBOOK_ADMIN_PSID=${FACEBOOK_ADMIN_PSID:-}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - api_chat_bot_network

volumes:
  postgres_db_api_chat_bot:
  n8n_data:

networks:
  api_chat_bot_network:
    driver: bridge
